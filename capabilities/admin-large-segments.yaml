naftiko: 1.0.0-alpha2
info:
  label: Split Admin API — Large Segments
  description: 'Split Admin API — Large Segments. 1 operations. Lead operation: List large segments in environment. Self-contained
    Naftiko capability covering one Split business surface.'
  tags:
  - Split
  - Large Segments
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SPLIT_API_KEY: SPLIT_API_KEY
capability:
  consumes:
  - type: http
    namespace: admin-large-segments
    baseUri: https://api.split.io/internal/api/v2
    description: Split Admin API — Large Segments business capability. Self-contained, no shared references.
    resources:
    - name: large-segments-ws-workspaceId-environments-environmentId
      path: /large-segments/ws/{workspaceId}/environments/{environmentId}
      operations:
      - name: listlargesegmentsinenvironment
        method: GET
        description: List large segments in environment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.SPLIT_API_KEY}}'
  exposes:
  - type: rest
    namespace: admin-large-segments-rest
    port: 8080
    description: REST adapter for Split Admin API — Large Segments. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/large-segments/ws/{workspaceid}/environments/{environmentid}
      name: large-segments-ws-workspaceid-environments-environmentid
      description: REST surface for large-segments-ws-workspaceId-environments-environmentId.
      operations:
      - method: GET
        name: listlargesegmentsinenvironment
        description: List large segments in environment
        call: admin-large-segments.listlargesegmentsinenvironment
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: admin-large-segments-mcp
    port: 9090
    transport: http
    description: MCP adapter for Split Admin API — Large Segments. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-large-segments-environment
      description: List large segments in environment
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-large-segments.listlargesegmentsinenvironment
      outputParameters:
      - type: object
        mapping: $.
