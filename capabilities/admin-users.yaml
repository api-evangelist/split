naftiko: 1.0.0-alpha2
info:
  label: Split Admin API — Users
  description: 'Split Admin API — Users. 5 operations. Lead operation: List users. Self-contained Naftiko capability covering
    one Split business surface.'
  tags:
  - Split
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SPLIT_API_KEY: SPLIT_API_KEY
capability:
  consumes:
  - type: http
    namespace: admin-users
    baseUri: https://api.split.io/internal/api/v2
    description: Split Admin API — Users business capability. Self-contained, no shared references.
    resources:
    - name: users
      path: /users
      operations:
      - name: listusers
        method: GET
        description: List users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: status
          in: query
          type: string
          description: Filter users by status
    - name: users-invite
      path: /users/invite
      operations:
      - name: inviteuser
        method: POST
        description: Invite user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: users-userId
      path: /users/{userId}
      operations:
      - name: getuser
        method: GET
        description: Get user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: userId
          in: path
          type: string
          description: The unique identifier of the user
          required: true
      - name: updateuser
        method: PUT
        description: Update user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: userId
          in: path
          type: string
          description: The unique identifier of the user
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteuser
        method: DELETE
        description: Deactivate user
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: userId
          in: path
          type: string
          description: The unique identifier of the user
          required: true
    authentication:
      type: bearer
      token: '{{env.SPLIT_API_KEY}}'
  exposes:
  - type: rest
    namespace: admin-users-rest
    port: 8080
    description: REST adapter for Split Admin API — Users. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/users
      name: users
      description: REST surface for users.
      operations:
      - method: GET
        name: listusers
        description: List users
        call: admin-users.listusers
        with:
          status: rest.status
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users/invite
      name: users-invite
      description: REST surface for users-invite.
      operations:
      - method: POST
        name: inviteuser
        description: Invite user
        call: admin-users.inviteuser
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users/{userid}
      name: users-userid
      description: REST surface for users-userId.
      operations:
      - method: GET
        name: getuser
        description: Get user
        call: admin-users.getuser
        with:
          userId: rest.userId
        outputParameters:
        - type: object
          mapping: $.
      - method: PUT
        name: updateuser
        description: Update user
        call: admin-users.updateuser
        with:
          userId: rest.userId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteuser
        description: Deactivate user
        call: admin-users.deleteuser
        with:
          userId: rest.userId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: admin-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for Split Admin API — Users. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-users
      description: List users
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-users.listusers
      with:
        status: tools.status
      outputParameters:
      - type: object
        mapping: $.
    - name: invite-user
      description: Invite user
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: admin-users.inviteuser
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-user
      description: Get user
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-users.getuser
      with:
        userId: tools.userId
      outputParameters:
      - type: object
        mapping: $.
    - name: update-user
      description: Update user
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: admin-users.updateuser
      with:
        userId: tools.userId
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: deactivate-user
      description: Deactivate user
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: admin-users.deleteuser
      with:
        userId: tools.userId
      outputParameters:
      - type: object
        mapping: $.
