naftiko: 1.0.0-alpha2
info:
  label: Split Evaluator API
  description: 'Split Evaluator API. 3 operations. Lead operation: Health check. Self-contained Naftiko capability covering
    one Split business surface.'
  tags:
  - Split
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SPLIT_API_KEY: SPLIT_API_KEY
capability:
  consumes:
  - type: http
    namespace: evaluator-general
    baseUri: http://localhost:7548
    description: Split Evaluator API business capability. Self-contained, no shared references.
    resources:
    - name: admin-healthcheck
      path: /admin/healthcheck
      operations:
      - name: healthcheck
        method: GET
        description: Health check
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: admin-ping
      path: /admin/ping
      operations:
      - name: ping
        method: GET
        description: Ping service
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: admin-version
      path: /admin/version
      operations:
      - name: getversion
        method: GET
        description: Get service version
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: evaluator-general-rest
    port: 8080
    description: REST adapter for Split Evaluator API. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/admin/healthcheck
      name: admin-healthcheck
      description: REST surface for admin-healthcheck.
      operations:
      - method: GET
        name: healthcheck
        description: Health check
        call: evaluator-general.healthcheck
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/admin/ping
      name: admin-ping
      description: REST surface for admin-ping.
      operations:
      - method: GET
        name: ping
        description: Ping service
        call: evaluator-general.ping
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/admin/version
      name: admin-version
      description: REST surface for admin-version.
      operations:
      - method: GET
        name: getversion
        description: Get service version
        call: evaluator-general.getversion
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: evaluator-general-mcp
    port: 9090
    transport: http
    description: MCP adapter for Split Evaluator API. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: health-check
      description: Health check
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: evaluator-general.healthcheck
      outputParameters:
      - type: object
        mapping: $.
    - name: ping-service
      description: Ping service
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: evaluator-general.ping
      outputParameters:
      - type: object
        mapping: $.
    - name: get-service-version
      description: Get service version
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: evaluator-general.getversion
      outputParameters:
      - type: object
        mapping: $.
