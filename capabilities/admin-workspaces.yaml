naftiko: 1.0.0-alpha2
info:
  label: Split Admin API — Workspaces
  description: 'Split Admin API — Workspaces. 1 operations. Lead operation: List workspaces. Self-contained Naftiko capability
    covering one Split business surface.'
  tags:
  - Split
  - Workspaces
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SPLIT_API_KEY: SPLIT_API_KEY
capability:
  consumes:
  - type: http
    namespace: admin-workspaces
    baseUri: https://api.split.io/internal/api/v2
    description: Split Admin API — Workspaces business capability. Self-contained, no shared references.
    resources:
    - name: workspaces
      path: /workspaces
      operations:
      - name: listworkspaces
        method: GET
        description: List workspaces
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.SPLIT_API_KEY}}'
  exposes:
  - type: rest
    namespace: admin-workspaces-rest
    port: 8080
    description: REST adapter for Split Admin API — Workspaces. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/workspaces
      name: workspaces
      description: REST surface for workspaces.
      operations:
      - method: GET
        name: listworkspaces
        description: List workspaces
        call: admin-workspaces.listworkspaces
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: admin-workspaces-mcp
    port: 9090
    transport: http
    description: MCP adapter for Split Admin API — Workspaces. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-workspaces
      description: List workspaces
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-workspaces.listworkspaces
      outputParameters:
      - type: object
        mapping: $.
