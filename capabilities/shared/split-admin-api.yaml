naftiko: "1.0.0-alpha1"

info:
  label: "Split Admin API"
  description: >-
    REST API for programmatic management of Split workspaces, environments,
    traffic types, attributes, users, groups, API keys, segments, and change
    requests within the Split (Harness Feature Management) platform.
  tags:
    - Feature Flags
    - Administration
    - Feature Management
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SPLIT_ADMIN_API_KEY: SPLIT_ADMIN_API_KEY

capability:
  consumes:
    - type: http
      namespace: split-admin
      baseUri: "https://api.split.io/internal/api/v2"
      description: "Split Admin API for managing workspaces, environments, and users."
      authentication:
        type: bearer
        token: "{{SPLIT_ADMIN_API_KEY}}"
      resources:
        - name: workspaces
          path: /workspaces
          description: "Manage workspaces (projects)."
          operations:
            - name: list-workspaces
              method: GET
              description: "Retrieve all workspaces accessible to the authenticated Admin API key."
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results to return."
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Number of results to skip."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: environments
          path: /environments/ws/{workspaceId}
          description: "Manage environments within a workspace."
          operations:
            - name: list-environments
              method: GET
              description: "Retrieve all environments within the specified workspace."
              inputParameters:
                - name: workspaceId
                  in: path
                  type: string
                  required: true
                  description: "The unique identifier of the workspace."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-environment
              method: POST
              description: "Create a new environment within the specified workspace."
              inputParameters:
                - name: workspaceId
                  in: path
                  type: string
                  required: true
                  description: "The unique identifier of the workspace."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  production: "{{tools.production}}"

        - name: users
          path: /users
          description: "Manage users within the account."
          operations:
            - name: list-users
              method: GET
              description: "Retrieve all users the Admin API key has access to."
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results."
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Number of results to skip."
                - name: status
                  in: query
                  type: string
                  required: false
                  description: "Filter by status: ACTIVE, DEACTIVATED, PENDING."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: invite-user
              method: POST
              description: "Invite a new user to the account."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  email: "{{tools.email}}"

        - name: groups
          path: /groups
          description: "Manage groups for organizing users."
          operations:
            - name: list-groups
              method: GET
              description: "Retrieve all active groups in the account."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-group
              method: POST
              description: "Create a new group."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  description: "{{tools.description}}"

        - name: segments
          path: /segments/ws/{workspaceId}
          description: "Manage segments within a workspace."
          operations:
            - name: list-segments
              method: GET
              description: "Retrieve all segments in the specified workspace."
              inputParameters:
                - name: workspaceId
                  in: path
                  type: string
                  required: true
                  description: "The unique identifier of the workspace."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: change-requests
          path: /changeRequests
          description: "Manage change request approval workflows."
          operations:
            - name: list-change-requests
              method: GET
              description: "Retrieve all change requests."
              inputParameters:
                - name: status
                  in: query
                  type: string
                  required: false
                  description: "Filter by status: OPEN, APPROVED, DECLINED, APPLIED, CANCELLED."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8110
      namespace: split-admin-rest
      resources:
        - path: /v1/workspaces
          name: workspaces
          description: "List Split workspaces."
          operations:
            - method: GET
              name: list-workspaces
              description: "List all workspaces."
              call: "split-admin.list-workspaces"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/environments
          name: environments
          description: "List environments in a workspace."
          operations:
            - method: GET
              name: list-environments
              description: "List all environments."
              call: "split-admin.list-environments"
              with:
                workspaceId: "rest.workspaceId"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/users
          name: users
          description: "Manage account users."
          operations:
            - method: GET
              name: list-users
              description: "List all users."
              call: "split-admin.list-users"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/groups
          name: groups
          description: "Manage user groups."
          operations:
            - method: GET
              name: list-groups
              description: "List all groups."
              call: "split-admin.list-groups"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/segments
          name: segments
          description: "Manage targeting segments."
          operations:
            - method: GET
              name: list-segments
              description: "List all segments."
              call: "split-admin.list-segments"
              with:
                workspaceId: "rest.workspaceId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9110
      namespace: split-admin-mcp
      transport: http
      tools:
        - name: list-workspaces
          description: "List all Split workspaces accessible to the API key."
          hints:
            readOnly: true
            idempotent: true
          call: "split-admin.list-workspaces"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-environments
          description: "List all environments in a Split workspace."
          hints:
            readOnly: true
            idempotent: true
          call: "split-admin.list-environments"
          with:
            workspaceId: "tools.workspaceId"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-users
          description: "List all users in the Split account."
          hints:
            readOnly: true
            idempotent: true
          call: "split-admin.list-users"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-groups
          description: "List all groups in the Split account."
          hints:
            readOnly: true
            idempotent: true
          call: "split-admin.list-groups"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-segments
          description: "List all targeting segments in a Split workspace."
          hints:
            readOnly: true
            idempotent: true
          call: "split-admin.list-segments"
          with:
            workspaceId: "tools.workspaceId"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-change-requests
          description: "List change requests for controlled approval workflows."
          hints:
            readOnly: true
            idempotent: true
          call: "split-admin.list-change-requests"
          outputParameters:
            - type: object
              mapping: "$."
