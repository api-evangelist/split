naftiko: "1.0.0-alpha1"

info:
  label: "Split Evaluator API"
  description: >-
    HTTP service wrapping Split SDKs to provide feature flag evaluation via REST.
    Enables applications that cannot embed an SDK to request treatment evaluations
    and track events over HTTP from a centralized evaluation microservice.
  tags:
    - Feature Flags
    - Evaluation
    - Treatments
    - Microservices
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SPLIT_EVALUATOR_HOST: SPLIT_EVALUATOR_HOST

capability:
  consumes:
    - type: http
      namespace: split-evaluator
      baseUri: "http://{{SPLIT_EVALUATOR_HOST}}:7548"
      description: "Split Evaluator service for feature flag treatment evaluation."
      resources:
        - name: health
          path: /admin
          description: "Service health and admin endpoints."
          operations:
            - name: health-check
              method: GET
              description: "Check that the Split Evaluator is connected and ready."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: evaluation
          path: /client
          description: "Feature flag evaluation endpoints."
          operations:
            - name: get-treatment
              method: GET
              description: "Evaluate a single feature flag for the given key."
              inputParameters:
                - name: key
                  in: query
                  type: string
                  required: true
                  description: "The customer key to evaluate against."
                - name: split-name
                  in: query
                  type: string
                  required: true
                  description: "The feature flag name to evaluate."
                - name: attributes
                  in: query
                  type: string
                  required: false
                  description: "JSON string of attributes for targeting."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: get-treatments
              method: GET
              description: "Evaluate multiple feature flags for the given key."
              inputParameters:
                - name: key
                  in: query
                  type: string
                  required: true
                  description: "The customer key."
                - name: split-names
                  in: query
                  type: string
                  required: true
                  description: "Comma-separated feature flag names."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: track-event
              method: GET
              description: "Record a custom event for a given key and event type."
              inputParameters:
                - name: key
                  in: query
                  type: string
                  required: true
                  description: "The customer key."
                - name: traffic-type
                  in: query
                  type: string
                  required: true
                  description: "The traffic type for the event."
                - name: event-type
                  in: query
                  type: string
                  required: true
                  description: "The type of event (e.g., purchase, click)."
                - name: value
                  in: query
                  type: number
                  required: false
                  description: "Optional numeric value."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8112
      namespace: split-evaluator-rest
      resources:
        - path: /v1/health
          name: health
          description: "Evaluator health check."
          operations:
            - method: GET
              name: health-check
              description: "Check evaluator service health."
              call: "split-evaluator.health-check"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/treatments
          name: treatments
          description: "Feature flag evaluation."
          operations:
            - method: GET
              name: get-treatment
              description: "Evaluate a feature flag treatment."
              call: "split-evaluator.get-treatment"
              with:
                key: "rest.key"
                split-name: "rest.flagName"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9112
      namespace: split-evaluator-mcp
      transport: http
      tools:
        - name: check-evaluator-health
          description: "Check that the Split Evaluator service is connected and ready to process evaluations."
          hints:
            readOnly: true
            idempotent: true
          call: "split-evaluator.health-check"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-treatment
          description: "Evaluate a single feature flag for a customer key and return the treatment value."
          hints:
            readOnly: true
            idempotent: true
          call: "split-evaluator.get-treatment"
          with:
            key: "tools.key"
            split-name: "tools.flagName"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-treatments
          description: "Evaluate multiple feature flags for a customer key in a single request."
          hints:
            readOnly: true
            idempotent: true
          call: "split-evaluator.get-treatments"
          with:
            key: "tools.key"
            split-names: "tools.flagNames"
          outputParameters:
            - type: object
              mapping: "$."

        - name: track-event
          description: "Record a custom event for experimentation metrics tracking."
          hints:
            readOnly: false
            idempotent: false
          call: "split-evaluator.track-event"
          with:
            key: "tools.key"
            traffic-type: "tools.trafficType"
            event-type: "tools.eventType"
          outputParameters:
            - type: object
              mapping: "$."
