naftiko: "1.0.0-alpha1"

info:
  label: "Split Feature Flag API"
  description: >-
    REST API for creating, editing, and managing feature flags and their
    environment-specific definitions within the Split platform. Supports
    treatments, targeting rules, percentage rollouts, and kill/restore operations.
  tags:
    - Feature Flags
    - Targeting
    - Rollouts
    - Feature Management
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SPLIT_ADMIN_API_KEY: SPLIT_ADMIN_API_KEY

capability:
  consumes:
    - type: http
      namespace: split-flags
      baseUri: "https://api.split.io/internal/api/v2"
      description: "Split Feature Flag API for managing feature flags and definitions."
      authentication:
        type: bearer
        token: "{{SPLIT_ADMIN_API_KEY}}"
      resources:
        - name: feature-flags
          path: /splits/ws/{workspaceId}
          description: "Manage feature flags within a workspace."
          operations:
            - name: list-feature-flags
              method: GET
              description: "Retrieve all feature flags within the specified workspace."
              inputParameters:
                - name: workspaceId
                  in: path
                  type: string
                  required: true
                  description: "The unique identifier of the workspace."
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Maximum number of results."
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Number of results to skip."
                - name: tags
                  in: query
                  type: string
                  required: false
                  description: "Filter by tag names (comma-separated)."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-feature-flag
              method: POST
              description: "Create a new feature flag within the specified workspace."
              inputParameters:
                - name: workspaceId
                  in: path
                  type: string
                  required: true
                  description: "The unique identifier of the workspace."
                - name: trafficTypeId
                  in: path
                  type: string
                  required: true
                  description: "The traffic type identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  description: "{{tools.description}}"

        - name: feature-flag-definitions
          path: /splits/ws/{workspaceId}/{featureFlagName}/environments/{environmentId}
          description: "Manage feature flag definitions in specific environments."
          operations:
            - name: get-feature-flag-definition
              method: GET
              description: "Retrieve the full definition of a feature flag in a specific environment."
              inputParameters:
                - name: workspaceId
                  in: path
                  type: string
                  required: true
                  description: "The unique identifier of the workspace."
                - name: featureFlagName
                  in: path
                  type: string
                  required: true
                  description: "The name of the feature flag."
                - name: environmentId
                  in: path
                  type: string
                  required: true
                  description: "The unique identifier or name of the environment."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: kill-feature-flag
              method: PUT
              description: "Kill a feature flag in the specified environment, forcing the default treatment."
              inputParameters:
                - name: workspaceId
                  in: path
                  type: string
                  required: true
                  description: "The unique identifier of the workspace."
                - name: featureFlagName
                  in: path
                  type: string
                  required: true
                  description: "The name of the feature flag."
                - name: environmentId
                  in: path
                  type: string
                  required: true
                  description: "The unique identifier or name of the environment."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: restore-feature-flag
              method: PUT
              description: "Restore a previously killed feature flag in the specified environment."
              inputParameters:
                - name: workspaceId
                  in: path
                  type: string
                  required: true
                  description: "The unique identifier of the workspace."
                - name: featureFlagName
                  in: path
                  type: string
                  required: true
                  description: "The name of the feature flag."
                - name: environmentId
                  in: path
                  type: string
                  required: true
                  description: "The unique identifier or name of the environment."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8111
      namespace: split-flags-rest
      resources:
        - path: /v1/feature-flags
          name: feature-flags
          description: "Manage Split feature flags."
          operations:
            - method: GET
              name: list-feature-flags
              description: "List all feature flags in a workspace."
              call: "split-flags.list-feature-flags"
              with:
                workspaceId: "rest.workspaceId"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/feature-flag-definitions
          name: feature-flag-definitions
          description: "Get feature flag definitions."
          operations:
            - method: GET
              name: get-feature-flag-definition
              description: "Get feature flag definition in an environment."
              call: "split-flags.get-feature-flag-definition"
              with:
                workspaceId: "rest.workspaceId"
                featureFlagName: "rest.featureFlagName"
                environmentId: "rest.environmentId"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9111
      namespace: split-flags-mcp
      transport: http
      tools:
        - name: list-feature-flags
          description: "List all feature flags in a Split workspace."
          hints:
            readOnly: true
            idempotent: true
          call: "split-flags.list-feature-flags"
          with:
            workspaceId: "tools.workspaceId"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-feature-flag-definition
          description: "Get the full targeting definition of a feature flag in a specific environment."
          hints:
            readOnly: true
            idempotent: true
          call: "split-flags.get-feature-flag-definition"
          with:
            workspaceId: "tools.workspaceId"
            featureFlagName: "tools.featureFlagName"
            environmentId: "tools.environmentId"
          outputParameters:
            - type: object
              mapping: "$."

        - name: kill-feature-flag
          description: "Kill a feature flag in an environment, forcing all evaluations to return the default treatment."
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "split-flags.kill-feature-flag"
          with:
            workspaceId: "tools.workspaceId"
            featureFlagName: "tools.featureFlagName"
            environmentId: "tools.environmentId"
          outputParameters:
            - type: object
              mapping: "$."

        - name: restore-feature-flag
          description: "Restore a killed feature flag to normal targeting rule evaluation."
          hints:
            readOnly: false
            destructive: false
            idempotent: true
          call: "split-flags.restore-feature-flag"
          with:
            workspaceId: "tools.workspaceId"
            featureFlagName: "tools.featureFlagName"
            environmentId: "tools.environmentId"
          outputParameters:
            - type: object
              mapping: "$."
