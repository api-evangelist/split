naftiko: 1.0.0-alpha2
info:
  label: Split Admin API — API Keys
  description: 'Split Admin API — API Keys. 2 operations. Lead operation: Create API key. Self-contained Naftiko capability
    covering one Split business surface.'
  tags:
  - Split
  - API Keys
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SPLIT_API_KEY: SPLIT_API_KEY
capability:
  consumes:
  - type: http
    namespace: admin-api-keys
    baseUri: https://api.split.io/internal/api/v2
    description: Split Admin API — API Keys business capability. Self-contained, no shared references.
    resources:
    - name: apiKeys
      path: /apiKeys
      operations:
      - name: createapikey
        method: POST
        description: Create API key
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: apiKeys-apiKeyId
      path: /apiKeys/{apiKeyId}
      operations:
      - name: deleteapikey
        method: DELETE
        description: Delete API key
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: apiKeyId
          in: path
          type: string
          description: The unique identifier of the API key
          required: true
    authentication:
      type: bearer
      token: '{{env.SPLIT_API_KEY}}'
  exposes:
  - type: rest
    namespace: admin-api-keys-rest
    port: 8080
    description: REST adapter for Split Admin API — API Keys. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/apikeys
      name: apikeys
      description: REST surface for apiKeys.
      operations:
      - method: POST
        name: createapikey
        description: Create API key
        call: admin-api-keys.createapikey
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/apikeys/{apikeyid}
      name: apikeys-apikeyid
      description: REST surface for apiKeys-apiKeyId.
      operations:
      - method: DELETE
        name: deleteapikey
        description: Delete API key
        call: admin-api-keys.deleteapikey
        with:
          apiKeyId: rest.apiKeyId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: admin-api-keys-mcp
    port: 9090
    transport: http
    description: MCP adapter for Split Admin API — API Keys. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: create-api-key
      description: Create API key
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: admin-api-keys.createapikey
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-api-key
      description: Delete API key
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: admin-api-keys.deleteapikey
      with:
        apiKeyId: tools.apiKeyId
      outputParameters:
      - type: object
        mapping: $.
