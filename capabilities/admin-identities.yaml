naftiko: 1.0.0-alpha2
info:
  label: Split Admin API — Identities
  description: 'Split Admin API — Identities. 4 operations. Lead operation: List segment keys. Self-contained Naftiko capability
    covering one Split business surface.'
  tags:
  - Split
  - Identities
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SPLIT_API_KEY: SPLIT_API_KEY
capability:
  consumes:
  - type: http
    namespace: admin-identities
    baseUri: https://api.split.io/internal/api/v2
    description: Split Admin API — Identities business capability. Self-contained, no shared references.
    resources:
    - name: segments-environmentId-segmentName-keys
      path: /segments/{environmentId}/{segmentName}/keys
      operations:
      - name: listsegmentkeys
        method: GET
        description: List segment keys
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: environmentId
          in: path
          type: string
          description: The unique identifier of the environment
          required: true
        - name: segmentName
          in: path
          type: string
          description: The name of the segment
          required: true
      - name: addsegmentkeys
        method: POST
        description: Add keys to segment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: environmentId
          in: path
          type: string
          description: The unique identifier of the environment
          required: true
        - name: segmentName
          in: path
          type: string
          description: The name of the segment
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: removesegmentkeys
        method: DELETE
        description: Remove keys from segment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: environmentId
          in: path
          type: string
          description: The unique identifier of the environment
          required: true
        - name: segmentName
          in: path
          type: string
          description: The name of the segment
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: segments-environmentId-segmentName-upload
      path: /segments/{environmentId}/{segmentName}/upload
      operations:
      - name: updatesegmentkeysviacsv
        method: PUT
        description: Update segment keys via CSV
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: environmentId
          in: path
          type: string
          description: The unique identifier of the environment
          required: true
        - name: segmentName
          in: path
          type: string
          description: The name of the segment
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.SPLIT_API_KEY}}'
  exposes:
  - type: rest
    namespace: admin-identities-rest
    port: 8080
    description: REST adapter for Split Admin API — Identities. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/segments/{environmentid}/{segmentname}/keys
      name: segments-environmentid-segmentname-keys
      description: REST surface for segments-environmentId-segmentName-keys.
      operations:
      - method: GET
        name: listsegmentkeys
        description: List segment keys
        call: admin-identities.listsegmentkeys
        with:
          environmentId: rest.environmentId
          segmentName: rest.segmentName
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: addsegmentkeys
        description: Add keys to segment
        call: admin-identities.addsegmentkeys
        with:
          environmentId: rest.environmentId
          segmentName: rest.segmentName
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: removesegmentkeys
        description: Remove keys from segment
        call: admin-identities.removesegmentkeys
        with:
          environmentId: rest.environmentId
          segmentName: rest.segmentName
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/segments/{environmentid}/{segmentname}/upload
      name: segments-environmentid-segmentname-upload
      description: REST surface for segments-environmentId-segmentName-upload.
      operations:
      - method: PUT
        name: updatesegmentkeysviacsv
        description: Update segment keys via CSV
        call: admin-identities.updatesegmentkeysviacsv
        with:
          environmentId: rest.environmentId
          segmentName: rest.segmentName
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: admin-identities-mcp
    port: 9090
    transport: http
    description: MCP adapter for Split Admin API — Identities. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-segment-keys
      description: List segment keys
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-identities.listsegmentkeys
      with:
        environmentId: tools.environmentId
        segmentName: tools.segmentName
      outputParameters:
      - type: object
        mapping: $.
    - name: add-keys-segment
      description: Add keys to segment
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: admin-identities.addsegmentkeys
      with:
        environmentId: tools.environmentId
        segmentName: tools.segmentName
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: remove-keys-segment
      description: Remove keys from segment
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: admin-identities.removesegmentkeys
      with:
        environmentId: tools.environmentId
        segmentName: tools.segmentName
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: update-segment-keys-csv
      description: Update segment keys via CSV
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: admin-identities.updatesegmentkeysviacsv
      with:
        environmentId: tools.environmentId
        segmentName: tools.segmentName
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
