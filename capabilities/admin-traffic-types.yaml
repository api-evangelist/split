naftiko: 1.0.0-alpha2
info:
  label: Split Admin API — Traffic Types
  description: 'Split Admin API — Traffic Types. 1 operations. Lead operation: List traffic types. Self-contained Naftiko
    capability covering one Split business surface.'
  tags:
  - Split
  - Traffic Types
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SPLIT_API_KEY: SPLIT_API_KEY
capability:
  consumes:
  - type: http
    namespace: admin-traffic-types
    baseUri: https://api.split.io/internal/api/v2
    description: Split Admin API — Traffic Types business capability. Self-contained, no shared references.
    resources:
    - name: trafficTypes-ws-workspaceId
      path: /trafficTypes/ws/{workspaceId}
      operations:
      - name: listtraffictypes
        method: GET
        description: List traffic types
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.SPLIT_API_KEY}}'
  exposes:
  - type: rest
    namespace: admin-traffic-types-rest
    port: 8080
    description: REST adapter for Split Admin API — Traffic Types. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/traffictypes/ws/{workspaceid}
      name: traffictypes-ws-workspaceid
      description: REST surface for trafficTypes-ws-workspaceId.
      operations:
      - method: GET
        name: listtraffictypes
        description: List traffic types
        call: admin-traffic-types.listtraffictypes
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: admin-traffic-types-mcp
    port: 9090
    transport: http
    description: MCP adapter for Split Admin API — Traffic Types. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: list-traffic-types
      description: List traffic types
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-traffic-types.listtraffictypes
      outputParameters:
      - type: object
        mapping: $.
