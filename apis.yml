aid: split
url: https://raw.githubusercontent.com/api-evangelist/split/refs/heads/main/apis.yml
apis:
  - aid: split:admin-api
    name: Split Admin API
    tags:
      - Feature Flags
      - Experimentation
      - Feature Management
      - Administration
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.split.io/internal/api/v2
    humanURL: https://docs.split.io/reference/introduction
    properties:
      - url: https://docs.split.io/reference/introduction
        type: Documentation
      - url: openapi/split-admin-api-openapi.yml
        type: OpenAPI
    description: >-
      The Split Admin API is a REST API that enables programmatic management of
      feature flags, environments, segments, and workspaces within the Split
      platform (now Harness Feature Management and Experimentation). Using this
      API, developers can create, update, delete, and retrieve feature flags, as
      well as configure targeting rules and segment definitions across
      environments. The API uses resource-oriented URLs, returns JSON responses,
      and requires Admin API keys for authentication.
  - aid: split:feature-flag-api
    name: Split Feature Flag API
    tags:
      - Feature Flags
      - Targeting
      - Rollouts
      - Treatments
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.split.io/internal/api/v2
    humanURL: https://docs.split.io/reference/feature-flag-overview
    properties:
      - url: https://docs.split.io/reference/feature-flag-overview
        type: Documentation
      - url: openapi/split-feature-flag-api-openapi.yml
        type: OpenAPI
    description: >-
      The Split Feature Flag API provides endpoints for creating, editing, and
      deleting feature flags and their definitions within specific environments.
      Developers can use this API to define treatments, configure targeting rules,
      set percentage-based rollouts, and manage feature flag lifecycles
      programmatically. It supports operations like creating feature flag
      definitions in environments, updating targeting configurations, and
      retrieving flag status across workspaces.
  - aid: split:evaluator-api
    name: Split Evaluator API
    tags:
      - Feature Flags
      - Evaluation
      - Treatments
      - Microservices
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.example.com
    humanURL: https://help.split.io/hc/en-us/articles/360020037072-Split-Evaluator
    properties:
      - url: https://help.split.io/hc/en-us/articles/360020037072-Split-Evaluator
        type: Documentation
      - url: openapi/split-evaluator-api-openapi.yml
        type: OpenAPI
    description: >-
      The Split Evaluator is an HTTP service that wraps Split SDKs to provide
      feature flag evaluation via a REST API. It enables applications that cannot
      directly embed an SDK to request treatment evaluations over HTTP, making it
      suitable for architectures where a centralized evaluation service is
      preferred. The Evaluator can be deployed as a standalone microservice that
      processes getTreatment calls and returns the appropriate treatments for
      given users and feature flags.
  - aid: split:javascript-sdk
    name: Split JavaScript SDK
    tags:
      - JavaScript
      - SDK
      - Feature Flags
      - Browser
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.example.com
    humanURL: https://help.split.io/hc/en-us/articles/360020448791-JavaScript-SDK
    properties:
      - url: https://help.split.io/hc/en-us/articles/360020448791-JavaScript-SDK
        type: Documentation
    description: >-
      The Split JavaScript SDK provides client-side integration for feature flag
      evaluation in browser-based applications. It handles real-time feature flag
      synchronization, treatment evaluation, event tracking, and impression
      management. The SDK supports streaming updates for instant flag changes,
      local evaluation for low-latency treatment decisions, and built-in support
      for React and Redux integrations.
  - aid: split:node-sdk
    name: Split Node.js SDK
    tags:
      - Node.js
      - SDK
      - Feature Flags
      - Server Side
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.example.com
    humanURL: https://help.split.io/hc/en-us/articles/360020564931-Node-js-SDK
    properties:
      - url: https://help.split.io/hc/en-us/articles/360020564931-Node-js-SDK
        type: Documentation
    description: >-
      The Split Node.js SDK enables server-side feature flag evaluation for
      Node.js applications. It provides local evaluation of feature flags with
      low latency, automatic synchronization of flag definitions, event tracking
      for experimentation metrics, and impression logging. The SDK is designed
      for backend services and supports both polling and streaming modes for
      keeping flag definitions up to date.
  - aid: split:java-sdk
    name: Split Java SDK
    tags:
      - Java
      - SDK
      - Feature Flags
      - Server Side
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.example.com
    humanURL: https://help.split.io/hc/en-us/articles/360020405151-Java-SDK
    properties:
      - url: https://help.split.io/hc/en-us/articles/360020405151-Java-SDK
        type: Documentation
    description: >-
      The Split Java SDK provides server-side feature flag evaluation for Java
      and JVM-based applications. It enables local treatment evaluation with
      minimal latency, automatic flag definition synchronization, and event
      tracking for experimentation. The SDK supports streaming and polling
      update modes and is suitable for integration into Spring, Micronaut,
      and other Java-based frameworks and microservice architectures.
  - aid: split:python-sdk
    name: Split Python SDK
    tags:
      - Python
      - SDK
      - Feature Flags
      - Server Side
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.example.com
    humanURL: https://help.split.io/hc/en-us/articles/360020359652-Python-SDK
    properties:
      - url: https://help.split.io/hc/en-us/articles/360020359652-Python-SDK
        type: Documentation
    description: >-
      The Split Python SDK enables server-side feature flag evaluation for
      Python applications. It provides local treatment evaluation, automatic
      synchronization of feature flag definitions, event tracking, and
      impression management. The SDK is well-suited for Django, Flask, and
      other Python web frameworks, as well as data pipelines and backend
      services that need controlled feature rollouts and experimentation.
  - aid: split:android-sdk
    name: Split Android SDK
    tags:
      - Android
      - SDK
      - Feature Flags
      - Mobile
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.example.com
    humanURL: https://www.split.io/product/languages/android-sdk/
    properties:
      - url: https://www.split.io/product/languages/android-sdk/
        type: Documentation
    description: >-
      The Split Android SDK provides feature flag evaluation for native Android
      applications. It supports local evaluation for low-latency treatment
      decisions, streaming updates for real-time flag changes, event tracking
      for experimentation, and impression management. The SDK is available as
      an open-source library on GitHub and integrates with the Android
      application lifecycle for efficient resource management.
  - aid: split:ios-sdk
    name: Split iOS SDK
    tags:
      - iOS
      - SDK
      - Feature Flags
      - Mobile
      - Swift
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.example.com
    humanURL: https://help.split.io/hc/en-us/articles/360020401491-iOS-SDK
    properties:
      - url: https://help.split.io/hc/en-us/articles/360020401491-iOS-SDK
        type: Documentation
    description: >-
      The Split iOS SDK provides feature flag evaluation for native iOS
      applications built with Swift or Objective-C. It supports local treatment
      evaluation, streaming updates for real-time flag synchronization, event
      tracking for experimentation metrics, and impression logging. The SDK is
      distributed via CocoaPods and Swift Package Manager and integrates with
      the iOS application lifecycle.
  - aid: split:react-sdk
    name: Split React SDK
    tags:
      - React
      - SDK
      - Feature Flags
      - Frontend
      - JavaScript
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.example.com
    humanURL: https://help.split.io/hc/en-us/articles/360038825091-React-SDK
    properties:
      - url: https://help.split.io/hc/en-us/articles/360038825091-React-SDK
        type: Documentation
    description: >-
      The Split React SDK provides React-specific components and hooks for
      integrating feature flags into React applications. It wraps the Split
      JavaScript SDK with React-native patterns including a SplitProvider
      context, useTreatments hooks, and conditional rendering components. The
      SDK handles automatic re-rendering when feature flag values change and
      supports both client-side and server-side rendering scenarios.
common:
  - type: JSON-LD
    url: json-ld/split-context.jsonld
  - type: JSONSchema
    url: json-schema/split-feature-flag-schema.json
  - type: JSONSchema
    url: json-schema/split-feature-flag-definition-schema.json
  - type: JSONSchema
    url: json-schema/split-segment-schema.json
